when:
  - event: pull_request
  - event: push
    branch: main
  - event: manual

steps:
  test:
    image: golang:1.25-alpine
    commands:
      - apk add --no-cache git
      - go build ./...
      - go vet ./...
      - go test ./...

  lint:
    image: golang:1.25-alpine
    commands:
      - apk add --no-cache git
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...
